    <title>Amigos ARU - Gestão Completa</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-content { display: none; }

    </style>

<body class="bg-slate-100">

    <div id="loginPage" class="fixed inset-0 bg-green-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-w-sm text-center">
            <h1 class="text-2xl font-black mb-6">AMIGOS ARU</h1>
            <button onclick="enterApp('player')" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold mb-4">ENTRAR JOGADOR</button>
            <input type="password" id="adminPass" placeholder="Senha ADM" class="w-full p-3 border rounded-xl mb-3 text-center outline-none">
            <button onclick="enterApp('admin')" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">ACESSO ADMIN</button>
        </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen pb-24">
        <nav class="bg-green-700 text-white p-4 flex justify-between items-center">
            <h2 class="font-bold">AMIGOS ARU</h2>
            <span id="roleTag" class="text-[10px] bg-white text-green-700 px-2 py-1 rounded font-black"></span>
        </nav>

        <div class="p-4 space-y-4">
            <section id="aba-home" class="tab-content active">
                <div class="bg-white p-6 rounded-3xl text-center shadow">
                    <p class="text-xs text-gray-400 font-bold">SALDO EM CAIXA</p>
                    <h3 id="dashCash" class="text-3xl font-black">R$ 0,00</h3>
                </div>
            </section>

            <section id="aba-jogadores" class="tab-content">
                <div class="admin-only flex-col bg-white p-4 rounded-3xl border-2 border-green-500 mb-4 w-full">
                    <input type="text" id="pName" placeholder="NOME DO JOGADOR" class="w-full p-2 border rounded-lg mb-2 outline-none">
                    <button onclick="addPlayer()" class="bg-green-600 text-white py-2 rounded-lg font-bold">SALVAR ATLETA</button>
                </div>
                <div id="playerList" class="space-y-2"></div>
            </section>

            <section id="aba-financeiro" class="tab-content">
                <div class="admin-only flex-col bg-white p-4 rounded-3xl border-2 border-blue-500 mb-4 w-full">
                    <h3 id="formTitle" class="font-bold text-xs mb-2 text-blue-600 uppercase">Novo Lançamento</h3>
                    <input type="hidden" id="editFinId">
                    <input type="text" id="fDesc" placeholder="DESCRIÇÃO (EX: COMPRA BOLA)" class="w-full p-2 border rounded-lg mb-2 outline-none text-sm font-bold uppercase">
                    <input type="number" id="fVal" placeholder="VALOR (EX: 50 ou -50 para saída)" class="w-full p-2 border rounded-lg mb-2 outline-none text-sm font-bold">
                    <button onclick="saveFinance()" id="btnSaveFin" class="bg-blue-600 text-white py-2 rounded-lg font-bold mb-3">LANÇAR NO CAIXA</button>
                    
                    <hr class="my-2">
                    <p class="text-[10px] font-bold text-red-500 uppercase mb-2">Zona de Perigo:</p>
                    <button onclick="clearAllFinance()" class="bg-red-600 text-white py-2 rounded-lg font-bold text-xs uppercase hover:bg-red-700 transition">
                        <i class="fas fa-exclamation-triangle"></i> Zerar Saldo e Histórico
                    </button>
                </div>
                
                <div class="bg-white p-4 rounded-3xl shadow">
                    <h4 class="text-xs font-bold text-gray-400 mb-3 uppercase">Histórico de Transações</h4>
                    <ul id="finHistory" class="space-y-2 divide-y"></ul>
                </div>
            </section>
        </div>

        <nav class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-around">
            <button onclick="showTab('aba-home')" class="text-green-600 flex flex-col items-center"><i class="fas fa-home text-lg"></i><span class="text-[10px]">Início</span></button>
            <button onclick="showTab('aba-jogadores')" class="text-gray-400 flex flex-col items-center"><i class="fas fa-users text-lg"></i><span class="text-[10px]">Membros</span></button>
            <button onclick="showTab('aba-financeiro')" class="text-gray-400 flex flex-col items-center"><i class="fas fa-wallet text-lg"></i><span class="text-[10px]">Caixa</span></button>
        </nav>
    </div>
