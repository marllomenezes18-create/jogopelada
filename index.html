<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Amigos ARU">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#15803d">
    
    <title>Amigos ARU - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-only { display: none !important; }
        .admin-active .admin-only { display: flex !important; }
        body { -webkit-tap-highlight-color: transparent; }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-heart { animation: heartbeat 1.5s infinite; }
    </style>
</head>
<body class="bg-slate-100 select-none">

    <!-- LOGIN -->
    <div id="loginPage" class="fixed inset-0 bg-green-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[2rem] w-full max-sm text-center shadow-2xl">
            <h1 class="text-2xl font-black mb-6 uppercase tracking-tighter text-slate-800">AMIGOS ARU</h1>
            <button onclick="window.enterApp('player')" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold mb-4 uppercase shadow-lg">Entrar Jogador</button>
            <input type="password" id="adminPass" placeholder="Senha ADM" class="w-full p-3 border rounded-xl mb-3 text-center outline-none font-bold">
            <button onclick="window.enterApp('admin')" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold uppercase">Acesso Admin</button>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="mainApp" class="hidden min-h-screen pb-24">
        <nav class="bg-green-700 text-white p-4 flex justify-between items-center sticky top-0 z-50 shadow-md">
            <h2 class="font-bold italic text-lg uppercase">Amigos ARU</h2>
            <span id="roleTag" class="text-[10px] bg-white text-green-700 px-2 py-1 rounded font-black uppercase italic"></span>
        </nav>

        <div class="p-4 space-y-4">
            
            <!-- ABA HOME -->
            <section id="aba-home" class="tab-content active space-y-4">
                <!-- BANNER DIA DAS MÃES -->
                <div class="bg-gradient-to-br from-rose-500 via-pink-500 to-orange-400 p-5 rounded-[2rem] text-white shadow-xl flex items-center gap-4 border-b-4 border-rose-700">
                    <div class="bg-white/20 p-4 rounded-2xl backdrop-blur-sm animate-heart">
                        <i class="fas fa-heart text-3xl"></i>
                    </div>
                    <div>
                        <h4 class="font-black uppercase italic text-sm tracking-tighter">Homenagem Amigos ARU</h4>
                        <p class="text-[11px] font-bold leading-tight opacity-95">Feliz Dia das Mães! Uma homenagem a quem nos ensinou o valor do amor e da união. ❤️</p>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-3xl text-center shadow-sm border-b-4 border-green-500">
                    <p class="text-xs text-gray-400 font-bold uppercase italic">Saldo em Caixa</p>
                    <h3 id="dashCash" class="text-4xl font-black text-slate-800">R$ 0,00</h3>
                    <button onclick="window.adjustTotalBalance()" class="admin-only mx-auto mt-2 bg-slate-100 text-slate-500 px-3 py-1 rounded-full text-[9px] font-bold uppercase">
                        <i class="fas fa-edit mr-1"></i> Corrigir Saldo Total
                    </button>
                </div>

                <div class="bg-slate-800 p-5 rounded-3xl text-white shadow-xl">
                    <h3 class="font-black mb-3 uppercase text-xs text-green-400 italic">Sorteio de Times</h3>
                    <div class="flex gap-2 mb-4">
                        <input type="number" id="numTeams" class="w-1/4 p-2 rounded-lg text-slate-900 font-bold text-center" value="2">
                        <button onclick="window.drawBalancedTeams()" class="flex-1 bg-green-500 text-white font-black rounded-lg py-2 uppercase text-xs">Sortear Agora</button>
                    </div>
                    <div id="drawResult" class="space-y-3 text-sm"></div>
                </div>
            </section>

            <!-- ABA JOGADORES -->
            <section id="aba-jogadores" class="tab-content">
                <div class="admin-only flex-col bg-white p-4 rounded-3xl border-2 border-green-500 mb-4 w-full shadow-md">
                    <h3 class="font-bold text-[10px] mb-3 text-green-600 uppercase italic">Cadastrar Atleta</h3>
                    <input type="text" id="pName" placeholder="NOME DO JOGADOR" class="w-full p-3 border rounded-xl mb-2 outline-none uppercase text-sm font-bold">
                    <div class="flex gap-2 mb-3">
                        <select id="pPos" class="flex-1 p-3 border rounded-xl text-xs font-bold">
                            <option value="🧤 Goleiro">🧤 Goleiro</option>
                            <option value="🛡️ Defensor">🛡️ Defensor</option>
                            <option value="🎯 Meio">🎯 Meio</option>
                            <option value="🚀 Atacante">🚀 Atacante</option>
                        </select>
                        <select id="pStars" class="flex-1 p-3 border rounded-xl text-xs font-bold">
                            <option value="5">⭐⭐⭐⭐⭐</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="3">⭐⭐⭐</option>
                        </select>
                    </div>
                    <button onclick="window.addPlayer()" class="w-full bg-green-600 text-white py-3 rounded-xl font-black uppercase text-xs">Salvar Jogador</button>
                </div>
                <div id="playerList" class="space-y-3"></div>
            </section>

            <!-- ABA FINANCEIRO -->
            <section id="aba-financeiro" class="tab-content">
                <div class="admin-only flex-col bg-white p-5 rounded-3xl border-2 border-blue-500 mb-4 w-full shadow-lg">
                    <h3 id="formTitle" class="font-black text-xs mb-3 text-blue-600 uppercase italic text-center">Gestão de Caixa</h3>
                    <input type="hidden" id="editFinId">
                    <div class="space-y-2">
                        <input type="text" id="fDesc" placeholder="DESCRIÇÃO" class="w-full p-3 border rounded-xl outline-none text-xs font-bold uppercase">
                        <input type="number" step="0.01" id="fVal" placeholder="VALOR" class="w-full p-3 border rounded-xl outline-none text-xs font-bold">
                        <div class="flex gap-2">
                            <button onclick="window.saveFinance('entrada')" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-black uppercase text-[10px]">Entrada</button>
                            <button onclick="window.saveFinance('despesa')" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-black uppercase text-[10px]">Saída</button>
                        </div>
                        <button id="cancelEdit" onclick="window.resetForm()" class="hidden w-full text-gray-400 text-[10px] font-bold uppercase mt-2">Cancelar Edição</button>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-sm">
                    <h4 class="text-[10px] font-black text-gray-400 mb-4 uppercase italic text-center">Extrato de Movimentações</h4>
                    <ul id="finHistory" class="space-y-3 divide-y divide-gray-50"></ul>
                </div>
            </section>
        </div>

        <!-- NAV -->
        <nav class="fixed bottom-0 w-full bg-white border-t p-4 flex justify-around rounded-t-[2rem] shadow-2xl z-50">
            <button onclick="window.showTab('aba-home')" class="nav-btn text-green-600 flex flex-col items-center"><i class="fas fa-home text-lg"></i><span class="text-[9px] font-black uppercase">Home</span></button>
            <button onclick="window.showTab('aba-jogadores')" class="nav-btn text-gray-400 flex flex-col items-center"><i class="fas fa-users text-lg"></i><span class="text-[9px] font-black uppercase">Membros</span></button>
            <button onclick="window.showTab('aba-financeiro')" class="nav-btn text-gray-400 flex flex-col items-center"><i class="fas fa-wallet text-lg"></i><span class="text-[9px] font-black uppercase">Caixa</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyCsqUeXLDpUhxvHxXOC19iRoQhPuYOGpFw",
            authDomain: "amigosaru-6a228.firebaseapp.com",
            projectId: "amigosaru-6a228",
            storageBucket: "amigosaru-6a228.firebasestorage.app",
            messagingSenderId: "1024825583351",
            appId: "1:1024825583351:web:7672e8e1a66ed9ab6c55f2"
        }));

        let currentFinance = [];
        let players = [];
        let totalGlobal = 0;

        window.enterApp = (role) => {
            if(role === 'admin') {
                if(document.getElementById('adminPass').value !== 'pelada22') return alert("Senha incorreta!");
                document.body.classList.add('admin-active');
            }
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('roleTag').innerText = role;
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-green-600', 'text-gray-400'));
            event.currentTarget.classList.replace('text-gray-400', 'text-green-600');
        };

        // --- FUNÇÃO DE PAGAMENTO CORRIGIDA ---
        window.payWithCalendar = async (name, inputId) => {
            const dateInput = document.getElementById(inputId);
            const dateValue = dateInput.value;
            
            if(!dateValue) {
                alert("Por favor, selecione o mês no calendário primeiro!");
                return;
            }

            const [y, m, d] = dateValue.split('-');
            const formattedDate = `${d}/${m}/${y}`;

            try {
                await addDoc(collection(db, "amigos_aru_caixa"), { 
                    desc: `MENSALIDADE: ${name}`, 
                    val: 20.00, 
                    date: formattedDate, 
                    ts: Date.now() 
                });
                alert(`Pagamento de ${name} (Mês: ${formattedDate}) registrado com sucesso!`);
                dateInput.value = ""; // Limpa o campo após pagar
            } catch (e) {
                alert("Erro ao processar pagamento. Tente novamente.");
            }
        };

        window.addPlayer = async () => {
            const name = document.getElementById('pName').value.toUpperCase().trim();
            const pos = document.getElementById('pPos').value;
            const stars = parseInt(document.getElementById('pStars').value);
            if(!name) return alert("Nome vazio!");
            await addDoc(collection(db, "amigos_aru_membros"), { name, pos, stars });
            document.getElementById('pName').value = "";
        };

        window.deletePlayer = async (id) => { if(confirm("Excluir?")) await deleteDoc(doc(db, "amigos_aru_membros", id)); };

        function renderPlayers() {
            const list = document.getElementById('playerList');
            if(!list) return;
            list.innerHTML = '';
            players.forEach((p, i) => {
                const isPaid = currentFinance.some(f => f.val > 0 && f.desc.includes(p.name));
                list.innerHTML += `<div class="bg-white p-4 rounded-3xl shadow-sm border-l-4 ${isPaid ? 'border-green-400' : 'border-orange-300'}">
                    <div class="flex justify-between items-center">
                        <div>
                            <span class="font-black text-xs uppercase italic">${p.name}</span>
                            <p class="text-[8px] text-gray-400 font-bold tracking-tighter">${p.pos} • ${'⭐'.repeat(p.stars)}</p>
                        </div>
                        <div class="flex gap-2 items-center">
                            <span class="text-[8px] font-black px-2 py-1 rounded uppercase ${isPaid ? 'bg-green-50 text-green-600' : 'bg-orange-50 text-orange-600'}">${isPaid ? 'PAGO' : 'PENDENTE'}</span>
                            <button onclick="window.deletePlayer('${p.id}')" class="admin-only text-red-300 ml-2"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="admin-only flex gap-2 pt-2 mt-2 border-t border-gray-50">
                        <input type="date" id="cal_${i}" class="flex-1 text-[10px] border rounded-lg p-1 font-bold outline-none bg-slate-50">
                        <button onclick="window.payWithCalendar('${p.name}', 'cal_${i}')" class="bg-green-600 text-white px-3 rounded-lg font-black text-[9px] uppercase italic">Pagar R$ 20</button>
                    </div>
                </div>`;
            });
        }

        window.editFinance = (id) => {
            const item = currentFinance.find(f => f.id === id);
            if(item) {
                window.showTab('aba-financeiro');
                document.getElementById('editFinId').value = item.id;
                document.getElementById('fDesc').value = item.desc;
                document.getElementById('fVal').value = Math.abs(item.val);
                document.getElementById('formTitle').innerText = "📍 EDITANDO VALOR";
                document.getElementById('cancelEdit').classList.remove('hidden');
            }
        };

        window.resetForm = () => {
            document.getElementById('editFinId').value = "";
            document.getElementById('fDesc').value = "";
            document.getElementById('fVal').value = "";
            document.getElementById('formTitle').innerText = "Gestão de Caixa";
            document.getElementById('cancelEdit').classList.add('hidden');
        };

        window.saveFinance = async (tipo) => {
            const id = document.getElementById('editFinId').value;
            const desc = document.getElementById('fDesc').value.toUpperCase().trim();
            let val = parseFloat(document.getElementById('fVal').value);
            if(!desc || isNaN(val)) return alert("Erro nos campos!");
            val = tipo === 'despesa' ? -Math.abs(val) : Math.abs(val);

            if(id) await updateDoc(doc(db, "amigos_aru_caixa", id), { desc, val });
            else await addDoc(collection(db, "amigos_aru_caixa"), { desc, val, date: new Date().toLocaleDateString('pt-BR'), ts: Date.now() });
            window.resetForm();
        };

        window.deleteFinance = async (id) => { if(confirm("Apagar?")) await deleteDoc(doc(db, "amigos_aru_caixa", id)); };

        window.adjustTotalBalance = async () => {
            const novo = parseFloat(prompt("Novo saldo total?", totalGlobal.toFixed(2)));
            if (!isNaN(novo)) {
                await addDoc(collection(db, "amigos_aru_caixa"), { desc: "AJUSTE DE SALDO", val: novo - totalGlobal, date: new Date().toLocaleDateString('pt-BR'), ts: Date.now() });
            }
        };

        window.drawBalancedTeams = () => {
            const n = parseInt(document.getElementById('numTeams').value);
            const res = document.getElementById('drawResult');
            res.innerHTML = '';
            if (players.length < n) return alert("Poucos jogadores!");
            const gks = players.filter(p => p.pos.includes('🧤')).sort(() => Math.random() - 0.5);
            const others = players.filter(p => !p.pos.includes('🧤')).sort((a, b) => b.stars - a.stars || Math.random() - 0.5);
            const teams = Array.from({ length: n }, () => []);
            gks.forEach((gk, i) => teams[i % n].push(gk));
            others.forEach((p, i) => teams[i % n].push(p));
            teams.forEach((t, i) => {
                let html = `<div class="bg-white/10 p-3 rounded-2xl border-l-4 border-green-400 mb-2">
                    <p class="text-green-400 font-black italic mb-1 uppercase text-[10px]">Time ${i + 1}</p>`;
                t.forEach(p => html += `<p class="flex justify-between uppercase"><span>${p.name}</span><span class="opacity-50 text-[9px]">${p.pos}</span></p>`);
                res.innerHTML += html + `</div>`;
            });
        };

        onSnapshot(query(collection(db, "amigos_aru_membros"), orderBy("name")), (s) => {
            players = s.docs.map(d => ({ id: d.id, ...d.data() }));
            renderPlayers();
        });

        onSnapshot(query(collection(db, "amigos_aru_caixa"), orderBy("ts", "desc")), (s) => {
            currentFinance = s.docs.map(d => ({ id: d.id, ...d.data() }));
            const hist = document.getElementById('finHistory');
            totalGlobal = 0;
            hist.innerHTML = '';
            currentFinance.forEach(f => {
                totalGlobal += f.val;
                hist.innerHTML += `<li class="flex justify-between items-center py-3">
                    <div class="flex-1"><p class="text-[10px] font-black uppercase">${f.desc}</p><p class="text-[8px] text-gray-300 font-bold italic">${f.date || '---'}</p></div>
                    <div class="flex items-center gap-3">
                        <span class="text-[11px] font-black ${f.val > 0 ? 'text-green-600' : 'text-red-600'}">R$ ${f.val.toFixed(2)}</span>
                        <div class="admin-only flex gap-1">
                            <button onclick="window.editFinance('${f.id}')" class="text-blue-400 p-2"><i class="fas fa-edit"></i></button>
                            <button onclick="window.deleteFinance('${f.id}')" class="text-red-300 p-2"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </li>`;
            });
            document.getElementById('dashCash').innerText = totalGlobal.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });
            renderPlayers();
        });
    </script>
</body>
</html>
